"area: tests":
  - changed-files:
      - any-glob-to-any-file: ["tests/**"]

"area: api":
  - changed-files:
      - any-glob-to-any-file: ["app/api/**"]

"area: infra":
  - changed-files:
      - any-glob-to-any-file: ["infra/**", "docker-compose.yml", "Dockerfile"]

"area: docs":
  - changed-files:
      - any-glob-to-any-file: ["docs/**", "*.md"]

"area: ci":
  - changed-files:
      - any-glob-to-any-file: [".github/**"]

"size: small":
  - changed-files:
      - any-glob-to-any-file: ["**"]
    max-files: 5

"size: large":
  - changed-files:
      - any-glob-to-any-file: ["**"]
    min-files: 20
